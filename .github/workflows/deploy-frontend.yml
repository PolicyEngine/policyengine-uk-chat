name: Deploy frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token=$VERCEL_TOKEN \
            --build-env NEXT_PUBLIC_BACKEND_URL=https://policyengine--policyengine-uk-chat-web.modal.run \
            --env NEXT_PUBLIC_BACKEND_URL=https://policyengine--policyengine-uk-chat-web.modal.run \
            --env BACKEND_URL=https://policyengine--policyengine-uk-chat-web.modal.run
