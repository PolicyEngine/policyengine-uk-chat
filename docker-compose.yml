services:
  frontend:
    container_name: frontend-microsim-public
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3006:3000"
    environment:
      - BACKEND_URL=http://backend-microsim-public:8080
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8001
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

  backend:
    container_name: backend-microsim-public
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8001:8080"
    environment:
      - ENVIRONMENT=local
      - DB_HOST=db-microsim-public
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-microsim}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_FAST_MODEL=claude-haiku-4-5
      - ANTHROPIC_COMPLEX_MODEL=claude-sonnet-4-6
      - ANTHROPIC_TITLE_MODEL=claude-haiku-4-5
      - POLICYENGINE_UK_DATA_TOKEN=${POLICYENGINE_UK_DATA_TOKEN}
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - DATABASE_URL=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@db-microsim-public:5432/${DB_NAME:-microsim}
      - HOSTNAMES=http://localhost:3006,http://frontend-microsim-public:3000
    depends_on:
      - db

  db:
    container_name: db-microsim-public
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-microsim}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-microsim-public:/var/lib/postgresql/data

volumes:
  postgres-data-microsim-public:
